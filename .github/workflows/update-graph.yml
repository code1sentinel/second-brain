name: Update graph view

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/generate-graph.js'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate graph data
        run: node scripts/generate-graph.js

      - name: Commit updated graph
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graph/index.html
          git diff --staged --quiet || git commit -m "chore: update graph view [skip ci]"
          git push
