name: Update graph

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/generate-graph.js'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate graph data and SVG
        run: node scripts/generate-graph.js

      - name: Commit updated graph files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graph/index.html graph/graph.svg
          git diff --staged --quiet || (git commit -m "chore: update graph [skip ci]" && git push)
